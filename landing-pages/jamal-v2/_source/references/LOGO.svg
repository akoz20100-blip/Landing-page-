<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      .wordmark {
        font-family: "Bodoni 72", Didot, "Bodoni MT", "Times New Roman", serif;
        font-size: 190px;
        font-weight: 300;
        letter-spacing: 78px;
        fill: #C09A62;
      }
      .tagline {
        font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif;
        font-size: 27px;
        font-weight: 300;
        letter-spacing: 30px;
        fill: #C09A62;
      }
      .rule {
        stroke: #C09A62;
        stroke-width: 2;
        stroke-linecap: round;
      }
    </style>
  </defs>
  <text class="wordmark" x="800" y="420" text-anchor="middle">JAMAL</text>
  <line class="rule" x1="600" y1="520" x2="1000" y2="520"/>
  <text class="tagline" x="800" y="600" text-anchor="middle">LINEN ATELIER</text>
</svg>
